name: 民泊届出データ 月次自動更新

on:
  # 毎月1日 09:00 JST (= 00:00 UTC) に自動実行
  schedule:
    - cron: "0 0 1 * *"

  # 手動実行も可能（GitHub上のActionsタブから）
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # JSONファイルをコミットするために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: 依存パッケージをインストール
        run: pip install -r scraper/requirements.txt

      - name: データ取得スクリプトを実行
        run: python scraper/main.py

      - name: 変更があればコミット・プッシュ
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add yadokari-app/public/data/minpaku_listings.json
          git diff --staged --quiet || git commit -m "chore: 民泊届出データを更新 ($(date '+%Y年%m月'))"
          git push
